{{- if .Values.routes.enabled -}}
# 1. Rota para a API Python (PyCRUD)
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pycrud-api-route
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
  - name: istio-gateway
    namespace: istio-system
  hostnames:
  - {{ .Values.routes.hostname | quote }}
  rules:
  - matches:
    - path: { type: PathPrefix, value: /users }
    - path: { type: PathPrefix, value: /health }
    - path: { type: PathPrefix, value: /apidocs/ }
    - path: { type: PathPrefix, value: /flasgger_static/ }
    - path: { type: Exact, value: /apispec_1.json } # Convertido de ImplementationSpecific para Exact
    backendRefs:
    - name: pycrud
      port: 8080
{{- end }}
---
{{- if .Values.pgadmin.routes.enabled -}}

# 2. Rota para o pgAdmin
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pgadmin-route
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
  - name: istio-gateway
    namespace: istio-system
  hostnames:
  - {{ .Values.pgadmin.routes.hostname | quote }}
  rules:
  - matches:
    - path: { type: PathPrefix, value: / }
    backendRefs:
    - name: pgadmin
      port: 8080
{{- end }}
